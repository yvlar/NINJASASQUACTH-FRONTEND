# Garde-fou D15 (ROADMAP, item 6.5) : le palier gratuit Supabase met le
# projet en pause après ~1 semaine d'inactivité — le catalogue public
# afficherait alors l'état d'erreur. Ce ping REST hebdomadaire maintient
# le projet actif.
#
# Secrets requis (Settings → Secrets and variables → Actions) :
#   SUPABASE_URL      — URL d'API du projet (ex. https://<ref>.supabase.co)
#   SUPABASE_ANON_KEY — clé publiable (publique par conception, hors dépôt
#                       par convention — voir DoD Sprint 6)
name: Supabase keepalive

on:
  schedule:
    - cron: "0 6 * * 1" # lundi 06:00 UTC
  workflow_dispatch: # déclenchement manuel pour vérifier les secrets

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping REST public (table games)
        run: |
          curl --fail-with-body -sS \
            "$SUPABASE_URL/rest/v1/games?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
