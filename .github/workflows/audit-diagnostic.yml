name: Audit diagnostic

on:
  push:
    branches:
      - agent/fix-admin-session-focus
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref_name || github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Corriger le lockfile et vérifier l'audit
        run: |
          npm audit fix --package-lock-only
          npm audit --audit-level=high
      - name: Publier le lockfile corrigé
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile déjà corrigé."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "fix(deps): corriger brace-expansion"
          git push
