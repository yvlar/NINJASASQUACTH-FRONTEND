name: Audit diagnostic

on:
  push:
    branches:
      - agent/fix-admin-session-focus
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Corriger le lockfile et vérifier l'audit
        run: |
          npm audit fix --package-lock-only
          npm audit --audit-level=high
      - uses: actions/upload-artifact@v4
        with:
          name: npm-audit-fixed-lock
          path: package-lock.json
          retention-days: 1
