# CI — vérifie mécaniquement la Definition of Done du workflow de sprint :
# audit de sécurité des dépendances de production, lint sans erreur, tests 100 %
# verts et build de production qui passe.
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Permissions minimales : le workflow ne fait que lire le dépôt.
permissions:
  contents: read

# Évite les runs parallèles/périmés sur une même PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  qualite:
    name: Lint + tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Version fixe pour rendre npm ci et npm audit reproductibles.
          node-version: 24
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      # Bloque la livraison si une dépendance réellement embarquée en production
      # contient une vulnérabilité high ou critical.
      - name: Audit de sécurité production
        run: npm audit --omit=dev --audit-level=high

      # Les outils de build sont audités et visibles dans les logs, mais une
      # alerte sur le serveur de développement ne doit pas empêcher lint/tests/build
      # d'évaluer une PR purement visuelle. Le lockfile sera mis à jour séparément.
      - name: Rapport de sécurité complet
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      # Inclut les tests de pré-rendu (prerender.test.tsx : H1 dans le HTML,
      # canonical/hreflang, JSON-LD valide, /admin hors sitemap, 404) et de
      # sécurité (security-headers, newsletter).
      - name: Tests (Vitest)
        run: npm test

      # Build client + bundle SSR + pré-rendu (dist/<route>, sitemap, robots).
      - name: Build de production + pré-rendu (Vite SSG)
        run: npm run build

      # Vérifie le HTML PRODUIT (contenu réel, pas seulement après hydratation)
      # et l'absence de tout secret dans le bundle livré.
      - name: Vérifier le pré-rendu et l'absence de secrets
        run: npm run verify:dist
