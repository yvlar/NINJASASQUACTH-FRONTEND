# CI — vérifie mécaniquement la Definition of Done du workflow de sprint :
# audit de sécurité sans vulnérabilité high, lint sans erreur, tests 100 % verts,
# build de production qui passe.
name: CI

on:
  push:
  pull_request:

jobs:
  qualite:
    name: Lint + tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      # Garde-fou sécurité (item 3.1) : échoue sur toute vulnérabilité high ou
      # critical pour que la dette npm ne se réinstalle pas silencieusement.
      - name: Audit de sécurité (npm audit)
        run: npm audit --audit-level=high

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      # Inclut les tests de pré-rendu (prerender.test.tsx : H1 dans le HTML,
      # canonical/hreflang, JSON-LD valide, /admin hors sitemap, 404) et de
      # sécurité (security-headers, newsletter).
      - name: Tests (Vitest)
        run: npm test -- --reporter=junit --outputFile=vitest-results.xml

      # Diagnostic temporaire de la PR : rend les assertions Vitest accessibles
      # même lorsque le journal Actions est tronqué par l'interface.
      - name: Publier le diagnostic Vitest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: vitest-results.xml
          if-no-files-found: ignore

      # Build client + bundle SSR + pré-rendu (dist/<route>, sitemap, robots).
      - name: Build de production + pré-rendu (Vite SSG)
        run: npm run build

      # Vérifie le HTML PRODUIT (contenu réel, pas seulement après hydratation)
      # et l'absence de tout secret dans le bundle livré.
      - name: Vérifier le pré-rendu et l'absence de secrets
        run: npm run verify:dist
