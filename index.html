<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_sasquatch_Ninja__7_.png" />
    <link rel="apple-touch-icon" href="/logo_sasquatch_Ninja__7_.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Typographie de marque (Sprint 10) en <link> préconnecté plutôt qu'en
         @import CSS bloquant (découverte D20 de ROADMAP.md) :
         Alfa Slab One (marque/titres), Atkinson Hyperlegible (corps, lisible),
         Black Ops One (accent Heroes Rising ponctuel). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Black+Ops+One&display=swap"
    />
    <!-- Métadonnées SEO par page :
         - au build, le pré-rendu REMPLACE le bloc entre les marqueurs
           app-head par les balises de la route (seo/renderHead.ts) ;
         - au runtime client, les composants React 19 de src/components/seo/
           (PageMeta) hissent les mêmes balises vers ce <head>.
         Le bloc de repli sert au shell « / » (redirige vers /fr) et à tout
         chargement avant hydratation. -->
    <!--app-head-start-->
    <title>Ninja Sasquatch Games — Jeux de société originaux du Québec</title>
    <meta
      name="description"
      content="Des jeux de société originaux, amusants et accessibles à tous — pensés au Québec, 100 % compostables."
    />
    <!--app-head-end-->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
